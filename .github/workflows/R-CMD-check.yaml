name: R-CMD-check

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  R-CMD-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            r: release
          - os: ubuntu-latest
            r: devel
          - os: ubuntu-latest
            r: oldrel-1
          - os: macos-latest
            r: release
          - os: windows-latest
            r: release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: any::rcmdcheck

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
